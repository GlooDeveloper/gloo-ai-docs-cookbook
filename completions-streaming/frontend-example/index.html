<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gloo AI Streaming Demo</title>
  <!-- Markdown rendering with sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9fafb;
      color: #111827;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    p.subtitle { color: #6b7280; margin-top: 0; margin-bottom: 24px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 16px; }
    textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 72px;
    }
    button {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      align-self: flex-end;
    }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #4338ca; }
    #status {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 12px;
      min-height: 20px;
    }
    #output {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px 24px;
      min-height: 120px;
      line-height: 1.7;
    }
    #output.streaming { border-color: #a5b4fc; }
    .cursor::after {
      content: "▋";
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .meta {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>Gloo AI Streaming Demo</h1>
  <p class="subtitle">Real-time streaming via fetch + ReadableStream</p>

  <div class="form-row">
    <textarea id="prompt" placeholder="Ask a question...">What is the significance of the resurrection?</textarea>
    <button id="sendBtn" onclick="startStream()">Send</button>
  </div>

  <div id="status"></div>
  <div id="output"><em>Response will appear here...</em></div>
  <div class="meta" id="meta"></div>

  <script type="module">
    // Proxy server URL — credentials are kept server-side; never call the Gloo API directly from the browser.
    const PROXY_URL = "http://localhost:3001/api/stream";

    let isStreaming = false;

    window.startStream = async function startStream() {
      if (isStreaming) return;

      const promptEl = document.getElementById("prompt");
      const outputEl = document.getElementById("output");
      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");
      const btn = document.getElementById("sendBtn");

      const message = promptEl.value.trim();
      if (!message) return;

      isStreaming = true;
      btn.disabled = true;
      outputEl.className = "streaming";
      outputEl.innerHTML = '<span class="cursor"></span>';
      statusEl.textContent = "Connecting...";
      metaEl.textContent = "";

      let buffer = "";
      let tokenCount = 0;
      const startTime = Date.now();

      function renderBuffer() {
        outputEl.innerHTML =
          DOMPurify.sanitize(marked.parse(buffer)) +
          '<span class="cursor"></span>';
      }

      try {
        // Use the proxy server so credentials are never exposed in the browser
        const response = await fetch(PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: [{ role: "user", content: message }],
            auto_routing: true,
          }),
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        statusEl.textContent = "Streaming...";

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let lineBuffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          lineBuffer += decoder.decode(value, { stream: true });
          const lines = lineBuffer.split("\n");
          lineBuffer = lines.pop() ?? "";

          for (const line of lines) {
            if (!line || !line.trim()) continue;
            if (!line.startsWith("data: ")) continue;

            const data = line.slice(6);
            if (data.trim() === "[DONE]") break;

            let chunk;
            try {
              chunk = JSON.parse(data);
            } catch {
              continue;
            }

            const content = chunk?.choices?.[0]?.delta?.content;
            if (content) {
              buffer += content;
              tokenCount += 1;
              renderBuffer();
            }
          }
        }

        reader.releaseLock();

        // Final render without cursor
        outputEl.className = "";
        outputEl.innerHTML = DOMPurify.sanitize(marked.parse(buffer));

        const durationMs = Date.now() - startTime;
        statusEl.textContent = "Done";
        metaEl.textContent = `${tokenCount} tokens • ${durationMs}ms`;
      } catch (err) {
        outputEl.className = "";
        outputEl.innerHTML = `<span style="color:#dc2626">Error: ${DOMPurify.sanitize(err.message)}</span>`;
        statusEl.textContent = "Error";
        console.error(err);
      } finally {
        isStreaming = false;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
